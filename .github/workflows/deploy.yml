name: Deploy to GitHub Pages
on:
  push:
    branches: [main, develop] # Jules can now trigger a build from develop
  pull_request:
    branches: [main] # This will run a check whenever Jules opens a PR
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          # This forces the action to use your package.json script
          node-version: 24
  a11y-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Run Pa11y Accessibility checks
        run: |
          npx -y serve dist -p 4321 &
          sleep 4
          npx -y pa11y-ci http://localhost:4321/ http://localhost:4321/info http://localhost:4321/products/candles http://localhost:4321/products/honey http://localhost:4321/coming-soon
  deploy:
    needs: [build, a11y-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
