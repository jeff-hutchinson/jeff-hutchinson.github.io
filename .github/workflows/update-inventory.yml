name: Update Inventory Status

on:
  repository_dispatch:
    types: [update_inventory]

# Ensure only one update runs at a time to strictly prevent git checkout race conditions
concurrency:
  group: inventory-update
  cancel-in-progress: false

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Assumes the user stored their generated PAT in GitHub Secrets as JULES_SERVICE_TOKEN
          # Required to allow an automated commit bypassing standard 'guest' restrictions
          token: ${{ secrets.JULES_SERVICE_TOKEN || github.token }}
          # Dynamically check out whichever branch the Admin Portal requests!
          ref: ${{ github.event.client_payload.target_branch || github.event.repository.default_branch }}
          
      - name: Setup Node.js Node Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Parse and Mutate Master JSON
        run: |
          node -e "
            const fs = require('fs');
            const path = './src/data/products.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            
            const productId = process.env.PAYLOAD_PRODUCT_ID;
            const variantId = process.env.PAYLOAD_VARIANT_ID;
            const newStatus = process.env.PAYLOAD_NEW_STATUS;
            
            const product = data.products.find(p => p.id === productId);
            if (product) {
              const variant = product.variants.find(v => v.id === variantId);
              if (variant) {
                variant.status = newStatus;
                fs.writeFileSync(path, JSON.stringify(data, null, 2));
                console.log('Success: JSON file overwritten correctly.');
              } else {
                console.error('API Error: Variant not found - ' + variantId);
                process.exit(1);
              }
            } else {
              console.error('API Error: Product not found - ' + productId);
              process.exit(1);
            }
          "
        env:
          PAYLOAD_PRODUCT_ID: ${{ github.event.client_payload.product_id }}
          PAYLOAD_VARIANT_ID: ${{ github.event.client_payload.variant_id }}
          PAYLOAD_NEW_STATUS: ${{ github.event.client_payload.new_status }}
          
      - name: Validate Integrity & Commit
        run: |
          git config --global user.name "Lauriville Inventory Bot"
          git config --global user.email "bot@laurievillefarms.com"
          
          # SAFETY CHECK: Verify that ONLY src/data/products.json has been modified
          # This prevents any malicious or accidental code injection during an inventory update
          MODIFIED_FILES=$(git status --short | grep -v "src/data/products.json" || true)
          if [ ! -z "$MODIFIED_FILES" ]; then
            echo "CRITICAL SAFETY ERROR: Unexpected files modified during inventory update!"
            echo "$MODIFIED_FILES"
            exit 1
          fi

          # We use a single persistent staging branch so multiple clicks don't spam Pull Requests!
          BRANCH_NAME="bot/inventory-staging"
          
          # Check if the branch already exists on the remote
          git fetch origin
          if git ls-remote --exit-code --heads origin $BRANCH_NAME; then
            # Branch exists, check it out and pull the latest commits so we don't overwrite previous clicks
            git checkout $BRANCH_NAME
            git pull origin $BRANCH_NAME
          else
            # Branch doesn't exist, create it from develop
            git checkout -b $BRANCH_NAME
          fi
          
          git add src/data/products.json
          git commit -m "chore(inventory): updated ${PAYLOAD_PRODUCT_ID} ${PAYLOAD_VARIANT_ID} to ${PAYLOAD_NEW_STATUS}" || exit 0
          
          # Push the appended commit to the staging branch
          git push -u origin $BRANCH_NAME
          
          # Attempt to open a PR. If it already exists, this safely fails silently and just updates the open PR!
          # We use the GitHub CLI to create and then immediately merge the PR if it's purely an inventory update
          PR_URL=$(gh pr create \
            --title "Inventory Updates Queue" \
            --body "Automated inventory changes requested by the Admin Portal. This PR has been pre-validated to ensure ONLY products.json was modified." \
            --base ${PAYLOAD_TARGET_BRANCH} \
            --head $BRANCH_NAME || gh pr list --head $BRANCH_NAME --json url --jq '.[0].url')
          
          # AUTO-MERGE: Since this is the allowed exception, we merge it immediately
          # This ensures the Admin Portal changes are live without manual 'Jules' intervention
          gh pr merge $PR_URL --merge --auto || echo "Auto-merge enabled for $PR_URL"
        env:
          GH_TOKEN: ${{ secrets.INVENTORY_BOT_TOKEN || github.token }}
          PAYLOAD_PRODUCT_ID: ${{ github.event.client_payload.product_id }}
          PAYLOAD_VARIANT_ID: ${{ github.event.client_payload.variant_id }}
          PAYLOAD_NEW_STATUS: ${{ github.event.client_payload.new_status }}
          PAYLOAD_TARGET_BRANCH: ${{ github.event.client_payload.target_branch || github.event.repository.default_branch }}
