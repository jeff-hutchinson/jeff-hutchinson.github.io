name: Update Inventory Status

on:
  repository_dispatch:
    types: [update_inventory]

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Assumes the user stored their generated PAT in GitHub Secrets as JULES_SERVICE_TOKEN
          # Required to allow an automated commit bypassing standard 'guest' restrictions
          token: ${{ secrets.JULES_SERVICE_TOKEN || github.token }}
          # Dynamically check out whichever branch the Admin Portal requests!
          ref: ${{ github.event.client_payload.target_branch || github.event.repository.default_branch }}
          
      - name: Setup Node.js Node Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Parse and Mutate Master JSON
        run: |
          node -e "
            const fs = require('fs');
            const path = './src/data/products.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            
            const productId = process.env.PAYLOAD_PRODUCT_ID;
            const variantId = process.env.PAYLOAD_VARIANT_ID;
            const newStatus = process.env.PAYLOAD_NEW_STATUS;
            
            const product = data.products.find(p => p.id === productId);
            if (product) {
              const variant = product.variants.find(v => v.id === variantId);
              if (variant) {
                variant.status = newStatus;
                fs.writeFileSync(path, JSON.stringify(data, null, 2));
                console.log('Success: JSON file overwritten correctly.');
              } else {
                console.error('API Error: Variant not found - ' + variantId);
                process.exit(1);
              }
            } else {
              console.error('API Error: Product not found - ' + productId);
              process.exit(1);
            }
          "
        env:
          PAYLOAD_PRODUCT_ID: ${{ github.event.client_payload.product_id }}
          PAYLOAD_VARIANT_ID: ${{ github.event.client_payload.variant_id }}
          PAYLOAD_NEW_STATUS: ${{ github.event.client_payload.new_status }}
          
      - name: Commit Status Overwrite to Repository
        run: |
          git config --global user.name "Lauriville Inventory Bot"
          git config --global user.email "bot@laurievillefarms.com"
          git add src/data/products.json
          git commit -m "chore(inventory): updated ${PAYLOAD_PRODUCT_ID} ${PAYLOAD_VARIANT_ID} to ${PAYLOAD_NEW_STATUS}" || exit 0
          # Push specifically to the target branch that was checked out
          git push origin HEAD:${PAYLOAD_TARGET_BRANCH}
        env:
          PAYLOAD_PRODUCT_ID: ${{ github.event.client_payload.product_id }}
          PAYLOAD_VARIANT_ID: ${{ github.event.client_payload.variant_id }}
          PAYLOAD_NEW_STATUS: ${{ github.event.client_payload.new_status }}
          PAYLOAD_TARGET_BRANCH: ${{ github.event.client_payload.target_branch || github.event.repository.default_branch }}
